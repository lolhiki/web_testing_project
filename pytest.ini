[pytest]
# Пути для поиска модулей (корень проекта)
pythonpath = .

# Папки с тестами
testpaths = tests

# Маркеры для группировки тестов
markers =
    smoke: Быстрая проверка (критический функционал)
    regression: Полная регрессия
    api: API тесты
    ui: UI тесты

# Настройки вывода
addopts =
    -v
    --strict-markers
    --tb=short

# Настройки логирования в консоли
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s - %(message)s

# Исключить лишние предупреждения
filterwarnings =
    ignore::DeprecationWarning